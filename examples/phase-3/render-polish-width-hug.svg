<svg xmlns="http://www.w3.org/2000/svg" width="245" height="87.03999999999999" role="img" aria-labelledby="ct-3rirn3-title ct-3rirn3-desc">
  <title id="ct-3rirn3-title">Change Tree</title>
  <desc id="ct-3rirn3-desc">Colored Unicode repository tree showing where changes live in a diff. Status markers: ++ added (green), ** changed (yellow), ~~ moved (purple), -- removed (red). Collapsed ... groups are authored summaries, not automatically verified file counts.</desc>
  <style>
    :root {
      --ct-fill: rgba(246,248,250,0.85);
      --ct-path: #24292f;
      --ct-muted: #57606a;
      --ct-added: #1a7f37;
      --ct-changed: #9a6700;
      --ct-moved: #8250df;
      --ct-removed: #cf222e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ct-fill: rgba(22,27,34,0.85);
        --ct-path: #e6edf3;
        --ct-muted: #8b949e;
        --ct-added: #3fb950;
        --ct-changed: #d29922;
        --ct-moved: #bc8cff;
        --ct-removed: #f85149;
      }
    }
    text { font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 13.6px; }
  </style>
  <text x="-1" y="23.799999999999997"><tspan fill="var(--ct-path)">.</tspan></text>
  <text x="-1" y="43.519999999999996"><tspan fill="var(--ct-muted)">├── </tspan><tspan fill="var(--ct-added)">++</tspan><tspan fill="var(--ct-path)"> src/a.ts</tspan><tspan fill="var(--ct-muted)" x="137.72"># add adapter</tspan></text>
  <text x="-1" y="63.239999999999995"><tspan fill="var(--ct-muted)">├── </tspan><tspan fill="var(--ct-changed)">**</tspan><tspan fill="var(--ct-path)"> src/b.ts</tspan><tspan fill="var(--ct-muted)" x="137.72"># tweak</tspan></text>
  <text x="-1" y="82.96"><tspan fill="var(--ct-muted)">└── </tspan><tspan fill="var(--ct-removed)">--</tspan><tspan fill="var(--ct-path)"> src/c.ts</tspan><tspan fill="var(--ct-muted)" x="137.72"># drop</tspan></text>
</svg>
